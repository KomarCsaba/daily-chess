{% extends "base.html" %}

{% block content %}
<div style="display: flex; gap: 20px; justify-content: center; align-items: flex-start;">

    <!-- Board Section -->
    <div>
        <div id="status" style="margin-bottom: 10px; font-size: 15px; min-height: 24px;"></div>

        <!-- Opponent -->
        <div style="margin-bottom: 8px; font-size: 14px; color: #aaa;">
            {{ game.get_opponent(current_user.id).username if game.get_opponent(current_user.id) else "Waiting for opponent..." }}
        </div>

        <!-- Board -->
        <div id="board" style="display: grid; grid-template-columns: repeat(8, 70px); grid-template-rows: repeat(8, 70px); border: 3px solid #555; background: #222;"></div>

        <!-- Your name -->
        <div style="margin-top: 8px; font-size: 14px; color: white; text-align: right;">
            {{ current_user.username }} (you)
        </div>
    </div>

    <!-- Side Panel -->
    <div style="width: 220px;">
        <!-- Game Info -->
        <div style="background-color: #2a2a2a; border-radius: 10px; padding: 15px; margin-bottom: 15px;">
            <div style="font-size: 13px; color: #aaa;">Game ID</div>
            <input type="text" value="{{ request.host_url }}join/{{ game.id }}" readonly
                   style="width: 100%; background: #3a3a3a; border: none; border-radius: 6px; color: #aaa; padding: 8px; font-size: 12px; margin-top: 6px;">
        </div>

        <!-- Moves -->
        <div style="background-color: #2a2a2a; border-radius: 10px; padding: 15px;">
            <div style="font-size: 13px; color: #aaa; margin-bottom: 10px;">Moves</div>
            <div id="moves" style="font-size: 13px; max-height: 380px; overflow-y: auto; line-height: 1.4;"></div>
        </div>

        <!-- Actions -->
        <div id="actions" style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;"></div>
    </div>
</div>

<style>
    .square {
        width: 70px; height: 70px;
        display: flex; justify-content: center; align-items: center;
        font-size: 48px; cursor: pointer; user-select: none;
        position: relative;
    }
    .light { background-color: #f0d9b5; }
    .dark { background-color: #b58863; }
    .selected { background-color: #7fc97f !important; }
    .last-move { background-color: #ffe066 !important; }
    .possible-move::after {
        content: ""; position: absolute;
        width: 28%; height: 28%; background: rgba(0,0,0,0.3);
        border-radius: 50%;
    }
    .possible-move.has-piece::after {
        width: 85%; height: 85%; background: transparent;
        box-shadow: inset 0 0 0 5px rgba(0,0,0,0.35);
    }
    .piece-white { color: white; text-shadow: 0 2px 4px #000; }
    .piece-black { color: #1a1a1a; text-shadow: 0 2px 4px #fff; }

    #status.your-turn { color: #5a9e6f; font-weight: bold; }
    #status.waiting { color: #aaa; }
</style>

<script>
    const PIECES = { "K":"♔","Q":"♕","R":"♖","B":"♗","N":"♘","P":"♙","k":"♚","q":"♛","r":"♜","b":"♝","n":"♞","p":"♟" };

    const gameId = "{{ game.id }}";
    const myColor = "{{ 'white' if game.white_id == current_user.id else 'black' }}";
    let currentFen = "{{ game.board_fen }}";
    let selectedSquare = null;
    let legalMoves = [];
    let isMyTurn = {{ 'true' if game.is_players_turn(current_user.id) else 'false' }};
    let gameStatus = "{{ game.status }}";

    let pollInterval = null;

    function fenToBoard(fen) {
        const pieces = {};
        const rows = fen.split(" ")[0].split("/");
        for (let r = 0; r < 8; r++) {
            let c = 0;
            for (let char of rows[r]) {
                if (isNaN(char)) {
                    pieces[`${c},${r}`] = char;
                    c++;
                } else c += parseInt(char);
            }
        }
        return pieces;
    }

    function colRowToUci(col, row) {
        return String.fromCharCode(97 + col) + (8 - row);
    }

    function buildBoard() {
        const boardEl = document.getElementById("board");
        boardEl.innerHTML = "";
        const rows = myColor === "black" ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7];
        const cols = myColor === "black" ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7];

        for (let row of rows) {
            for (let col of cols) {
                const square = document.createElement("div");
                square.className = `square ${(row + col) % 2 === 0 ? "light" : "dark"}`;
                square.dataset.col = col;
                square.dataset.row = row;
                square.addEventListener("click", onSquareClick);
                boardEl.appendChild(square);
            }
        }
    }

    function updateBoard(highlightLastMove = true) {
        const pieces = fenToBoard(currentFen);
        const squares = document.querySelectorAll(".square");

        squares.forEach(sq => {
            const col = parseInt(sq.dataset.col);
            const row = parseInt(sq.dataset.row);
            const key = `${col},${row}`;

            // Reset classes
            sq.className = `square ${(row + col) % 2 === 0 ? "light" : "dark"}`;
            sq.textContent = "";

            if (pieces[key]) {
                sq.textContent = PIECES[pieces[key]];
                sq.classList.add(pieces[key] === pieces[key].toUpperCase() ? "piece-white" : "piece-black");
            }

            if (selectedSquare && selectedSquare.col === col && selectedSquare.row === row) {
                sq.classList.add("selected");
            }
            if (legalMoves.some(m => m.col === col && m.row === row)) {
                sq.classList.add("possible-move");
                if (pieces[key]) sq.classList.add("has-piece");
            }
        });
    }

    async function getLegalMoves(col, row) {
        const res = await fetch(`/legal_moves/${gameId}/${col}/${row}`);
        const data = await res.json();
        legalMoves = data.moves.map(m => {
            const [c, r] = m.split(",").map(Number);
            return {col: c, row: r};
        });
        updateBoard();
    }

    async function onSquareClick(e) {
        if (!isMyTurn || gameStatus !== "active") return;

        const col = parseInt(e.currentTarget.dataset.col);
        const row = parseInt(e.currentTarget.dataset.row);
        const pieces = fenToBoard(currentFen);
        const piece = pieces[`${col},${row}`];

        if (selectedSquare === null) {
            const isMyPiece = piece && (
                (myColor === "white" && piece === piece.toUpperCase()) ||
                (myColor === "black" && piece === piece.toLowerCase())
            );
            if (isMyPiece) {
                selectedSquare = { col, row };
                await getLegalMoves(col, row);
            }
        } else {
            // Try to make move
            const from = colRowToUci(selectedSquare.col, selectedSquare.row);
            const to = colRowToUci(col, row);
            let moveStr = from + to;

            const fromPiece = pieces[`${selectedSquare.col},${selectedSquare.row}`];
            if (fromPiece?.toLowerCase() === "p" && ((myColor === "white" && row === 0) || (myColor === "black" && row === 7))) {
                moveStr += "q";
            }

            await makeMove(moveStr);
        }
    }

    async function makeMove(move) {
        const res = await fetch(`/move/${gameId}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ move })
        });

        const data = await res.json();

        if (data.success) {
            currentFen = data.fen;
            gameStatus = data.game_status;
            selectedSquare = null;
            legalMoves = [];
            isMyTurn = false;
            updateBoard();
            updateMoveList();
            updateStatus();
            updateActions();

            // Slight delay for visual satisfaction
            setTimeout(() => {
                if (data.game_status === "active") startPolling();
            }, 300);
        } else {
            alert(data.error || "Illegal move");
            selectedSquare = null;
            legalMoves = [];
            updateBoard();
        }
    }

    function updateStatus() {
        const statusEl = document.getElementById("status");
        if (gameStatus === "finished") {
            statusEl.textContent = "Game Over";
            statusEl.className = "";
        } else if (isMyTurn) {
            statusEl.textContent = "Your turn";
            statusEl.className = "your-turn";
        } else {
            statusEl.textContent = "Waiting for opponent...";
            statusEl.className = "waiting";
        }
    }

    async function updateMoveList() {
        const res = await fetch(`/moves/${gameId}`);
        const data = await res.json();
        const movesEl = document.getElementById("moves");
        movesEl.innerHTML = "";
        // ... (I'll expand this if needed)
        data.moves.forEach((move, i) => {
            const div = document.createElement("div");
            div.textContent = move;
            movesEl.appendChild(div);
        });
        movesEl.scrollTop = movesEl.scrollHeight;
    }

    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(async () => {
            if (isMyTurn || gameStatus !== "active") return;

            const res = await fetch(`/game_state/${gameId}`);
            const data = await res.json();

            if (data.fen && data.fen !== currentFen) {
                currentFen = data.fen;
                isMyTurn = data.is_my_turn;
                gameStatus = data.status;
                currentResult = data.result;
                currentDrawOfferedBy = data.draw_offered_by ?? null;
                updateBoard();
                updateMoveList();
                updateStatus();
                updateActions();
            } else if (data.draw_offered_by !== undefined && data.draw_offered_by !== currentDrawOfferedBy) {
                currentDrawOfferedBy = data.draw_offered_by;
                updateActions();
            }
        }, 2500);
    }

    const drawOfferedBy = {{ game.draw_offered_by | tojson }};
    let currentDrawOfferedBy = drawOfferedBy;
    const myId = {{ current_user.id }};
    const gameResult = {{ game.result | tojson }};
    let currentResult = gameResult;

    function updateActions() {
        const actionsEl = document.getElementById("actions");
        actionsEl.innerHTML = "";

        if (gameStatus === "finished") {
            // Rematch button
            const rematchBtn = document.createElement("a");
            rematchBtn.href = `/rematch/${gameId}`;
            rematchBtn.className = "btn";
            rematchBtn.style.textAlign = "center";
            rematchBtn.textContent = "Rematch";
            actionsEl.appendChild(rematchBtn);

            // Result label
            const resultDiv = document.createElement("div");
            resultDiv.style.cssText = "text-align:center; font-size:14px; color:#aaa; margin-top:4px;";
            if (currentResult === "draw") {
                resultDiv.textContent = "Game ended in a draw";
            } else if (
                (currentResult === "white_wins" && myColor === "white") ||
                (currentResult === "black_wins" && myColor === "black")
            ) {
                resultDiv.textContent = "🏆 You won!";
                resultDiv.style.color = "#5a9e6f";
            } else {
                resultDiv.textContent = "You lost";
            }
            actionsEl.appendChild(resultDiv);
            return;
        }

        if (gameStatus !== "active") return;

        // Draw offered by opponent — show Accept button
        if (currentDrawOfferedBy && currentDrawOfferedBy !== myId) {
            const acceptForm = document.createElement("form");
            acceptForm.action = `/accept_draw/${gameId}`;
            acceptForm.method = "POST";
            const acceptBtn = document.createElement("button");
            acceptBtn.type = "submit";
            acceptBtn.className = "btn";
            acceptBtn.style.cssText = "width:100%; background-color:#5a7a9e;";
            acceptBtn.textContent = "Accept Draw";
            acceptForm.appendChild(acceptBtn);
            actionsEl.appendChild(acceptForm);
        }

        if (isMyTurn) {
            // Offer Draw
            if (!currentDrawOfferedBy) {
                const drawForm = document.createElement("form");
                drawForm.action = `/offer_draw/${gameId}`;
                drawForm.method = "POST";
                const drawBtn = document.createElement("button");
                drawBtn.type = "submit";
                drawBtn.className = "btn btn-secondary";
                drawBtn.style.width = "100%";
                drawBtn.textContent = "Offer Draw";
                drawForm.appendChild(drawBtn);
                actionsEl.appendChild(drawForm);
            } else if (currentDrawOfferedBy === myId) {
                const pendingDiv = document.createElement("div");
                pendingDiv.style.cssText = "text-align:center; font-size:13px; color:#aaa; padding:8px;";
                pendingDiv.textContent = "Draw offer pending...";
                actionsEl.appendChild(pendingDiv);
            }

            // Resign
            const resignForm = document.createElement("form");
            resignForm.action = `/resign/${gameId}`;
            resignForm.method = "POST";
            resignForm.onsubmit = () => confirm("Are you sure you want to resign?");
            const resignBtn = document.createElement("button");
            resignBtn.type = "submit";
            resignBtn.className = "btn btn-secondary";
            resignBtn.style.cssText = "width:100%; background-color:#6b2b2b;";
            resignBtn.textContent = "Resign";
            resignForm.appendChild(resignBtn);
            actionsEl.appendChild(resignForm);
        }
    }

    // Initialize
    buildBoard();
    updateBoard();
    updateStatus();
    updateMoveList();
    updateActions();
    if (!isMyTurn && gameStatus === "active") startPolling();
</script>
{% endblock %}
