{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/game.css') }}">

<div class="game-layout">

    <!-- Board Section -->
    <div class="board-section">

        <div id="status" class="status"></div>

        <div class="player-label opponent-name">
            <span>{{ game.get_opponent(current_user.id).username if game.get_opponent(current_user.id) else "Waiting for opponent..." }}</span>
            <span id="opponent-clock" class="player-clock"></span>
        </div>

        <div class="board-wrapper">

            <div class="top-coordinates coordinates horizontal" id="top-files"></div>

            <div class="board-row">

                <div class="coordinates vertical" id="left-ranks"></div>

                <div id="board" class="board"></div>

                <div class="coordinates vertical" id="right-ranks"></div>

            </div>

            <div class="bottom-coordinates coordinates horizontal" id="bottom-files"></div>

        </div>

        <div class="player-label current-player">
            <span>{{ current_user.username }} (you)</span>
            <span id="my-clock" class="player-clock"></span>
        </div>
    </div>

    <!-- Side Panel -->
    <div class="sidebar">

        <div class="panel">
            <div class="panel-title">Game</div>
            <div style="display: grid; gap: 10px;">
                <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px;">
                    <span style="color: #aaa; font-size: 13px;">Code</span>
                    <span style="font-family: monospace; font-size: 14px;">{{ game.join_code }}</span>
                </div>
                <button
                    type="button"
                    id="copy-invite-btn"
                    class="btn btn-secondary"
                    data-copy="{{ initial_state.invite_url }}"
                >
                    Copy Invite
                </button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">Time Control</div>
            <div id="timer" class="timer">
                <div id="timer-label" class="timer-label"></div>
                <div id="timer-value" class="timer-value"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">Moves</div>
            <div id="moves" class="moves-list"></div>
        </div>

        <div id="actions" class="actions"></div>

    </div>
</div>

<script>
    window.GAME_CONFIG = {
        gameId: {{ game.id | tojson }},
        myColor: {{ ('white' if game.white_id == current_user.id else 'black') | tojson }},
        currentFen: {{ initial_state.fen | tojson }},
        isMyTurn: {{ initial_state.is_my_turn | tojson }},
        gameStatus: {{ initial_state.status | tojson }},
        drawOfferedBy: {{ initial_state.draw_offered_by | tojson }},
        myId: {{ current_user.id | tojson }},
        gameResult: {{ initial_state.result | tojson }},
        turn: {{ initial_state.turn | tojson }},
        turnDeadline: {{ initial_state.turn_deadline | tojson }},
        secondsRemaining: {{ initial_state.seconds_remaining | tojson }},
        turnTimeHours: {{ initial_state.turn_time_hours | tojson }},
        turnTimeSeconds: {{ initial_state.turn_time_seconds | tojson }},
        timeControlLabel: {{ initial_state.time_control_label | tojson }},
        timeControlDescription: {{ initial_state.time_control_description | tojson }},
        timeControlMode: {{ initial_state.time_control_mode | tojson }},
        whiteTimeRemaining: {{ initial_state.white_time_remaining | tojson }},
        blackTimeRemaining: {{ initial_state.black_time_remaining | tojson }}
    };
</script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='js/game.js') }}"></script>
<script>
    const copyInviteButton = document.getElementById("copy-invite-btn");
    if (copyInviteButton) {
        copyInviteButton.addEventListener("click", async () => {
            const originalText = copyInviteButton.textContent;
            try {
                await navigator.clipboard.writeText(copyInviteButton.dataset.copy);
                copyInviteButton.textContent = "Copied";
            } catch (error) {
                copyInviteButton.textContent = "Copy failed";
            }

            setTimeout(() => {
                copyInviteButton.textContent = originalText;
            }, 1500);
        });
    }
</script>
{% endblock %}
