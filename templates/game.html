{% extends "base.html" %}

{% block content %}
<div style="display: flex; gap: 20px; justify-content: center; align-items: flex-start;">

    <div style="display: flex; flex-direction: column;">
        <div id="status" style="margin-bottom: 10px; font-size: 15px; min-height: 24px;"></div>

        <div style="margin-bottom: 8px; font-size: 14px; color: #aaa;">
            {{ game.get_opponent(current_user.id).username if game.get_opponent(current_user.id) else "Waiting for opponent..." }}
        </div>

        <div id="board" style="display: grid; grid-template-columns: repeat(8, 70px); grid-template-rows: repeat(8, 70px); border: 3px solid #555; background: #222;"></div>

        <div style="margin-top: 8px; font-size: 14px; color: white; text-align: right;">
            {{ current_user.username }} (you)
        </div>
    </div>

    <div style="width: 220px; display: flex; flex-direction: column; gap: 15px;">

        <div style="background-color: #2a2a2a; border-radius: 10px; padding: 15px;">
            <div style="font-size: 13px; color: #aaa;">Game ID</div>
            <input type="text" value="{{ request.host_url }}join/{{ game.id }}" readonly
                   style="width: 100%; background: #3a3a3a; border: none; border-radius: 6px; color: #aaa; padding: 8px; font-size: 12px; margin-top: 6px;">
        </div>

        <div style="background-color: #2a2a2a; border-radius: 10px; padding: 15px;">
            <div style="font-size: 13px; color: #aaa; margin-bottom: 10px;">Moves</div>
            <div id="moves" style="font-size: 13px; max-height: 380px; overflow-y: auto; line-height: 1.4;"></div>
        </div>

        <div id="actions" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div>
</div>

<style>
    /* Board Styling */
    .square { width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; font-size: 48px; cursor: pointer; user-select: none; position: relative; }
    .light { background-color: #f0d9b5; }
    .dark { background-color: #b58863; }
    .selected { background-color: #7fc97f !important; }
    .last-move { background-color: #ffe066 !important; }

    .possible-move::after { content: ""; position: absolute; width: 28%; height: 28%; background: rgba(0,0,0,0.3); border-radius: 50%; }
    .possible-move.has-piece::after { width: 85%; height: 85%; background: transparent; box-shadow: inset 0 0 0 5px rgba(0,0,0,0.35); }

    .piece-white { color: white; text-shadow: 0 2px 4px #000; }
    .piece-black { color: #1a1a1a; text-shadow: 0 2px 4px #fff; }

    /* UI State */
    #status.your-turn { color: #5a9e6f; font-weight: bold; }
    #status.waiting { color: #aaa; }
</style>

<script>
    // --- Configuration & Initialization ---
    const PIECES = { "K":"♔","Q":"♕","R":"♖","B":"♗","N":"♘","P":"♙","k":"♚","q":"♛","r":"♜","b":"♝","n":"♞","p":"♟" };
    const gameId = "{{ game.id }}";
    const myColor = "{{ 'white' if game.white_id == current_user.id else 'black' }}";
    let currentFen = "{{ game.board_fen }}";
    let selectedSquare = null;
    let legalMoves = [];
    let isMyTurn = {{ 'true' if game.is_players_turn(current_user.id) else 'false' }};
    let gameStatus = "{{ game.status }}";
    let pollInterval = null;

    // --- State Management ---
    function fenToBoard(fen) {
        const pieces = {};
        const rows = fen.split(" ")[0].split("/");
        for (let r = 0; r < 8; r++) {
            let c = 0;
            for (let char of rows[r]) {
                if (isNaN(char)) { pieces[`${c},${r}`] = char; c++; }
                else c += parseInt(char);
            }
        }
        return pieces;
    }

    // --- Board Rendering ---
    function buildBoard() {
        const boardEl = document.getElementById("board");
        boardEl.innerHTML = "";
        const indices = myColor === "black" ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7];

        for (let row of indices) {
            for (let col of indices) {
                const square = document.createElement("div");
                square.className = `square ${(row + col) % 2 === 0 ? "light" : "dark"}`;
                square.dataset.col = col;
                square.dataset.row = row;
                square.addEventListener("click", onSquareClick);
                boardEl.appendChild(square);
            }
        }
    }

    function updateBoard() {
        const pieces = fenToBoard(currentFen);
        document.querySelectorAll(".square").forEach(sq => {
            const col = parseInt(sq.dataset.col), row = parseInt(sq.dataset.row);
            const key = `${col},${row}`;
            sq.className = `square ${(row + col) % 2 === 0 ? "light" : "dark"}`;
            sq.textContent = pieces[key] ? PIECES[pieces[key]] : "";

            if (pieces[key]) sq.classList.add(pieces[key] === pieces[key].toUpperCase() ? "piece-white" : "piece-black");
            if (selectedSquare?.col === col && selectedSquare?.row === row) sq.classList.add("selected");
            if (legalMoves.some(m => m.col === col && m.row === row)) {
                sq.classList.add("possible-move");
                if (pieces[key]) sq.classList.add("has-piece");
            }
        });
    }

    // --- Actions ---
    async function onSquareClick(e) {
        if (!isMyTurn || gameStatus !== "active") return;
        const col = parseInt(e.currentTarget.dataset.col), row = parseInt(e.currentTarget.dataset.row);
        const pieces = fenToBoard(currentFen);

        if (selectedSquare === null) {
            const piece = pieces[`${col},${row}`];
            const isMyPiece = piece && ((myColor === "white" && piece === piece.toUpperCase()) || (myColor === "black" && piece === piece.toLowerCase()));
            if (isMyPiece) { selectedSquare = { col, row }; await getLegalMoves(col, row); }
        } else {
            const from = String.fromCharCode(97 + selectedSquare.col) + (8 - selectedSquare.row);
            const to = String.fromCharCode(97 + col) + (8 - row);
            let moveStr = from + to;
            if (pieces[`${selectedSquare.col},${selectedSquare.row}`]?.toLowerCase() === "p" && (row === 0 || row === 7)) moveStr += "q";
            await makeMove(moveStr);
        }
    }

    async function makeMove(move) {
        const res = await fetch(`/move/${gameId}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ move }) });
        const data = await res.json();
        if (data.success) {
            currentFen = data.fen; gameStatus = data.game_status; selectedSquare = null; legalMoves = []; isMyTurn = false;
            updateBoard(); updateMoveList(); updateStatus(); updateActions();
            if (gameStatus === "active") startPolling();
        } else { alert(data.error || "Illegal move"); selectedSquare = null; legalMoves = []; updateBoard(); }
    }

    // --- Initialization ---
    // (Preserve existing logic for updateStatus, updateMoveList, updateActions, getLegalMoves, and startPolling here)
    buildBoard(); updateBoard(); updateStatus(); updateMoveList(); updateActions();
    if (!isMyTurn && gameStatus === "active") startPolling();
</script>
{% endblock %}
